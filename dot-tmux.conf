# Fix Vim ESC delay
set -sg escape-time 0

# Increase scrollback buffer
set -g history-limit 50000

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Enable mouse support
set -g mouse on

# Status bar colors
set -g status-style 'bg=#13161d fg=#8b949e'
set -g status-left-length 20
set -g status-right-length 50

# Status bar content
set -g status-left '#[fg=#61ffca,bold] #S #[fg=#30363d]│ '
set -g status-right '#[fg=#30363d]│#[fg=#61ffca] %H:%M #[fg=#30363d]│#[fg=#61ffca] %d-%b-%y '



# Window status
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format '#[fg=#61ffca,bold] #I:#W '

# Pane border colors
set -g pane-border-style 'fg=#30363d'
set -g pane-active-border-style 'fg=#00e68a'

# Message styling
set -g message-style 'bg=#00e68a fg=#000000 bold'
